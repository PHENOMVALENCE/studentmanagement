<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Details - SMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div th:replace="~{fragments/base :: layout(~{::main})}">
        <main>
            <div class="mb-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <a th:href="@{/parent}" class="text-blue-600 hover:text-blue-800">
                            <i class="fas fa-arrow-left"></i>
                        </a>
                        <h1 class="text-2xl font-bold text-gray-900">Parent Details</h1>
                    </div>
                    <div class="flex gap-2">
                        <a th:href="@{/parent/{id}/edit(id=${parent.id})}" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
                            <i class="fas fa-edit mr-2"></i>Edit
                        </a>
                        <a th:href="@{/parent/{id}/delete(id=${parent.id})}" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg"
                           onclick="return confirm('Are you sure you want to delete this parent?')">
                            <i class="fas fa-trash mr-2"></i>Delete
                        </a>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Parent Information -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">Parent Information</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-500">ID</label>
                                <p class="mt-1 text-sm text-gray-900" th:text="${parent.id}">1</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500">Full Name</label>
                                <p class="mt-1 text-sm text-gray-900" th:text="${parent.name}">John Doe</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500">Email</label>
                                <p class="mt-1 text-sm text-gray-900" th:text="${parent.email}">john@example.com</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500">Phone</label>
                                <p class="mt-1 text-sm text-gray-900" th:text="${parent.phone}">+1234567890</p>
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-500">Address</label>
                                <p class="mt-1 text-sm text-gray-900" th:text="${parent.address}">123 Main St, City, State</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Children List -->
                <div>
                    <div class="bg-white rounded-lg shadow-sm p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">Children</h2>
                        <div class="space-y-3">
                            <div th:each="child : ${parent.children}" class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                <div>
                                    <p class="font-medium text-gray-900" th:text="${child.name}">Student Name</p>
                                    <p class="text-sm text-gray-500" th:text="${child.email}">student@example.com</p>
                                </div>
                                <a th:href="@{/student/{id}(id=${child.id})}" class="text-blue-600 hover:text-blue-800">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            </div>
                            <div th:if="${#lists.isEmpty(parent.children)}" class="text-center text-gray-500 py-4">
                                No children registered
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
