<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Parent - SMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div th:replace="~{fragments/base :: layout(~{::main})}">
        <main>
            <div class="mb-6">
                <div class="flex items-center gap-4">
                    <a th:href="@{/parent}" class="text-blue-600 hover:text-blue-800">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="text-2xl font-bold text-gray-900">Edit Parent</h1>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6">
                <form th:action="@{/parent/save}" th:object="${parent}" method="post" class="space-y-6">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                            <input type="text" id="name" th:field="*{name}" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('name')}" class="text-red-600 text-sm mt-1" th:errors="*{name}"></div>
                        </div>

                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                            <input type="email" id="email" th:field="*{email}" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('email')}" class="text-red-600 text-sm mt-1" th:errors="*{email}"></div>
                        </div>

                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
                            <input type="tel" id="phone" th:field="*{phone}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('phone')}" class="text-red-600 text-sm mt-1" th:errors="*{phone}"></div>
                        </div>

                        <div>
                            <label for="address" class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                            <input type="text" id="address" th:field="*{address}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('address')}" class="text-red-600 text-sm mt-1" th:errors="*{address}"></div>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-4 pt-6">
                        <a th:href="@{/parent}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                            Cancel
                        </a>
                        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            <i class="fas fa-save mr-2"></i>Update Parent
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
