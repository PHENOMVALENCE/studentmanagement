<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Students - Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body >
  

     <!-- Include Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="ml-64">
        <!-- Include Navbar -->
        <div th:replace="fragments/navbar :: navbar"></div>

        <main class="p-6">
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">All Students</h2>
                    <p class="text-gray-600">Manage and view all registered students</p>
                </div>
                <a href="/student/new" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i>Add Student
                </a>
            </div>
            
            <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                <div class="p-6">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-4">
                            <input type="text" placeholder="Search students..." class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <select class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option>All Students</option>
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200">
                                <tr th:each="student : ${students}" th:if="${students != null}">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${student.id}">1</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${student.username}">john_doe</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${student.email}">john@example.com</td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                        <a th:href="@{/student/{id}(id=${student.id})}" class="text-blue-600 hover:text-blue-900">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/student/{id}/edit(id=${student.id})}" class="text-green-600 hover:text-green-900">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                      <button onclick="confirmDelete([["${student.id}"]])" class="text-red-600 hover:text-red-900">
                                            <i class="fas fa-trash"></i>
                                        </button> 
                                    </td>
                                </tr>
                                <tr th:if="${students == null or #lists.isEmpty(students)}">
                                    <td colspan="4" class="px-6 py-4 text-center text-gray-500">No students found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div> -->

    <!-- Include Scripts -->
    <div th:replace="fragments/scripts :: scripts"></div>
    
    <script>
        function confirmDelete(studentId) {
            if (confirm('Are you sure you want to delete this student?')) {
                // Create a form and submit it for deletion
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = '/student/' + studentId + '/delete';
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script> 
</body>
</html>
