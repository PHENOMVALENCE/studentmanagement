<header th:fragment="navbar" class="bg-white shadow-sm border-b border-gray-200">
    <div class="flex items-center justify-between px-6 py-4">
        <div class="flex items-center">
            <h2 class="text-2xl font-semibold text-gray-800" th:text="${title}">Student Management System</h2>
        </div>
        
        <div class="flex items-center space-x-4">
            <div class="relative">
                <button class="p-2 text-gray-400 hover:text-gray-600">
                    <i class="fas fa-bell text-xl"></i>
                </button>
            </div>
            
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                    <span class="text-white text-sm font-medium" th:text="${name != null ? name.substring(0,1) : 'A'}">A</span>
                </div>
                <span class="text-gray-700 font-medium" th:text="${name ?: 'Admin User'}">Admin User</span>
            </div>
        </div>
    </div>
</header>
