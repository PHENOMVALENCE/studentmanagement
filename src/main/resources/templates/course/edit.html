<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course - SMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div th:replace="~{fragments/base :: layout(~{::main})}">
        <main>
            <div class="mb-6">
                <div class="flex items-center gap-4">
                    <a th:href="@{/course}" class="text-blue-600 hover:text-blue-800">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h1 class="text-2xl font-bold text-gray-900">Edit Course</h1>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm p-6">
                <form th:action="@{/course/save}" th:object="${course}" method="post" class="space-y-6">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="code" class="block text-sm font-medium text-gray-700 mb-2">Course Code *</label>
                            <input type="text" id="code" th:field="*{code}" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('code')}" class="text-red-600 text-sm mt-1" th:errors="*{code}"></div>
                        </div>

                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Course Name *</label>
                            <input type="text" id="name" th:field="*{name}" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('name')}" class="text-red-600 text-sm mt-1" th:errors="*{name}"></div>
                        </div>

                        <div>
                            <label for="department" class="block text-sm font-medium text-gray-700 mb-2">Department *</label>
                            <select id="department" th:field="*{department}" required
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                                <option value="">Select Department</option>
                                <option value="CS">Computer Science</option>
                                <option value="MATH">Mathematics</option>
                                <option value="ENG">English</option>
                                <option value="SCI">Science</option>
                                <option value="HIST">History</option>
                                <option value="ART">Arts</option>
                            </select>
                            <div th:if="${#fields.hasErrors('department')}" class="text-red-600 text-sm mt-1" th:errors="*{department}"></div>
                        </div>

                        <div>
                            <label for="credits" class="block text-sm font-medium text-gray-700 mb-2">Credits *</label>
                            <input type="number" id="credits" th:field="*{credits}" required min="1" max="6"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('credits')}" class="text-red-600 text-sm mt-1" th:errors="*{credits}"></div>
                        </div>

                        <div>
                            <label for="instructor" class="block text-sm font-medium text-gray-700 mb-2">Instructor</label>
                            <input type="text" id="instructor" th:field="*{instructor}"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('instructor')}" class="text-red-600 text-sm mt-1" th:errors="*{instructor}"></div>
                        </div>

                        <div>
                            <label for="maxStudents" class="block text-sm font-medium text-gray-700 mb-2">Max Students</label>
                            <input type="number" id="maxStudents" th:field="*{maxStudents}" min="1"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <div th:if="${#fields.hasErrors('maxStudents')}" class="text-red-600 text-sm mt-1" th:errors="*{maxStudents}"></div>
                        </div>
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                        <textarea id="description" th:field="*{description}" rows="4"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                        <div th:if="${#fields.hasErrors('description')}" class="text-red-600 text-sm mt-1" th:errors="*{description}"></div>
                    </div>

                    <div class="flex justify-end space-x-4 pt-6">
                        <a th:href="@{/course}" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                            Cancel
                        </a>
                        <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            <i class="fas fa-save mr-2"></i>Update Course
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
