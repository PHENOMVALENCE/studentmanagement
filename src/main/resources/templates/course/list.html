<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management - SMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div th:replace="~{fragments/base :: layout(~{::main})}">
        <main>
            <div class="mb-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-gray-900">Course Management</h1>
                    <a th:href="@{/course/new}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                        <i class="fas fa-plus"></i>
                        Add New Course
                    </a>
                </div>
            </div>

            <!-- Search and Filter -->
            <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                <form th:action="@{/course}" method="get" class="flex gap-4">
                    <div class="flex-1">
                        <input type="text" name="search" th:value="${param.search}" 
                               placeholder="Search courses by name or code..." 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <select name="department" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">All Departments</option>
                        <option value="CS" th:selected="${param.department == 'CS'}">Computer Science</option>
                        <option value="MATH" th:selected="${param.department == 'MATH'}">Mathematics</option>
                        <option value="ENG" th:selected="${param.department == 'ENG'}">English</option>
                        <option value="SCI" th:selected="${param.department == 'SCI'}">Science</option>
                    </select>
                    <button type="submit" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg">
                        <i class="fas fa-search mr-2"></i>Search
                    </button>
                </form>
            </div>

            <!-- Courses Table -->
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Code</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Department</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Credits</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Instructor</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Enrolled</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="course : ${courses}" class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${course.code}">CS101</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${course.name}">Introduction to Programming</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${course.department}">Computer Science</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${course.credits}">3</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${course.instructor}">Dr. Smith</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${#lists.size(course.students)}">25</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                <a th:href="@{/course/{id}(id=${course.id})}" class="text-blue-600 hover:text-blue-900">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/course/{id}/edit(id=${course.id})}" class="text-green-600 hover:text-green-900">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/course/{id}/delete(id=${course.id})}" class="text-red-600 hover:text-red-900" 
                                   onclick="return confirm('Are you sure you want to delete this course?')">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courses)}">
                            <td colspan="7" class="px-6 py-4 text-center text-gray-500">No courses found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
